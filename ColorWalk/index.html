<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>颜色转盘</title>
        <link rel="stylesheet" href="css/main.css">
    </head>
    <body>
        <h1>🎨 颜色转盘</h1>
        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="wheel" id="wheel"></div>
            <button class="center-btn" id="spinBtn">↻</button>
        </div>
        <div class="config-panel">
            <div class="panel-header">
                <div class="config-title">⚙️ 转盘颜色</div>
                <button class="refresh-btn" onclick="randomizeColors()">重新随机</button>
            </div>
            <div class="color-list" id="colorList"></div>

            <div class="divider"></div>

            <div class="available-colors">
                <div class="available-title">🎨 备选颜色（点击添加）</div>
                <div class="available-grid" id="availableColors"></div>
            </div>
        </div>
        <script src="js/main.js"></script>
    </body>
</html>
