<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>ColorWalk | 色彩探索</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/main.css">
    </head>
    <body>
        <div class="grain-overlay"></div>
        <div class="gradient-orbs">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
        </div>

        <div class="container">
            <header class="header">
                <a href="../index.html" class="back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    <span>返回</span>
                </a>
                <div class="header-content">
                    <p class="subtitle">色彩漫步</p>
                    <h1 class="title">ColorWalk</h1>
                    <p class="tagline">随机一种颜色，用一天去寻找城市里的色彩故事</p>
                </div>
            </header>

            <main class="main">
                <div class="wheel-section">
                    <div class="wheel-container">
                        <div class="pointer">
                            <div class="pointer-inner"></div>
                        </div>
                        <div class="wheel" id="wheel"></div>
                        <button class="center-btn" id="spinBtn">
                            <span class="btn-icon">↻</span>
                            <span class="btn-text">Spin</span>
                        </button>
                    </div>
                </div>

                <div class="config-panel">
                    <div class="panel-header">
                        <div class="panel-title-group">
                            <span class="panel-icon">🎨</span>
                            <h2 class="panel-title">转盘颜色</h2>
                        </div>
                        <button class="refresh-btn" onclick="randomizeColors()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                            </svg>
                            <span>重新随机</span>
                        </button>
                    </div>

                    <div class="color-list" id="colorList"></div>

                    <div class="divider">
                        <span class="divider-text">or</span>
                    </div>

                    <div class="available-colors">
                        <div class="available-header">
                            <h3 class="available-title">备选颜色</h3>
                            <span class="available-hint">点击添加到转盘</span>
                        </div>
                        <div class="available-grid" id="availableColors"></div>
                    </div>
                </div>
            </main>

            <footer class="footer">
                <p>转动转盘，抽取今日主题色，开启你的色彩漫步</p>
            </footer>
        </div>

        <script src="js/main.js"></script>
    </body>
</html>
